spring.application.name=deploy


spring.datasource.url=${DB_URL:jdbc:postgresql://pg-deploy23881-deploy-7366.e.aivencloud.com:11068/defaultdb?sslmode=require}
spring.datasource.username=${DB_USERNAME:avnadmin}
spring.datasource.password=${DB_PASSWORD:AVNS_CIk_6PJbfggvxf-wC5U}
spring.datasource.driver-class-name=org.postgresql.Driver

#HIKARI CONNECTION POOL
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=10000
spring.datasource.hikari.max-lifetime=30000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.initializationFailTimeout=60000

#JPA / HIBERNATE
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-swl=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

#LOGGING
logging.level.org.hibernate.SQL=DEBUG
logging.level.com.zexxer.hikari=DEBUG

#GRACEFUL SHUTDOWN
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=10s